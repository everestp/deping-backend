syntax = "proto3";

package monitor;

option go_package = "grpc/pb;pb";

// ─── Service Definition ────────────────────────────────────────────────────
service MonitorService {
  // Bidirectional streaming RPC. The miner sends MinerMessages (register, ping,
  // probe results) and the Go gateway sends ServerMessages (pong, job batches).
  rpc JobStream(stream MinerMessage) returns (stream ServerMessage);
}

// ─── Miner → Server ───────────────────────────────────────────────────────
message MinerMessage {
  oneof payload {
    MinerRegister register = 1;
    Ping          ping     = 2;
    ProbeResult   result   = 3;
  }
}

message MinerRegister {
  string node_id      = 1;  // ed25519 public key hex or Solana wallet pubkey
  string version      = 2;  // semver string, e.g. "0.1.0"
  uint64 timestamp_ms = 3;
}

message Ping {
  uint64 timestamp_ms = 1;
  string node_id      = 2;
}

// ─── Server → Miner ───────────────────────────────────────────────────────
message ServerMessage {
  oneof payload {
    Pong     pong      = 1;
    JobBatch job_batch = 2;
  }
}

message Pong {
  uint64 timestamp_ms   = 1;
  uint64 server_time_ms = 2;
}

message JobBatch {
  string   batch_id = 1;
  repeated Job jobs = 2;
}

message Job {
  string job_id     = 1;  // UUID
  string target_url = 2;  // fully qualified, e.g. "https://example.com/health"
  uint32 timeout_ms = 3;  // per-probe wall-clock ceiling
}

// ─── Probe Result (Miner → Server) ────────────────────────────────────────
message ProbeResult {
  string job_id      = 1;
  string batch_id    = 2;
  string node_id     = 3;
  string target_url  = 4;
  bool   success     = 5;
  uint32 status_code = 6;  // 0 when connection never established

  // Phase latencies in microseconds for sub-millisecond precision
  uint64 dns_us   = 7;
  uint64 tcp_us   = 8;
  uint64 tls_us   = 9;   // 0 for plain HTTP
  uint64 ttfb_us  = 10;
  uint64 total_us = 11;

  string error_kind   = 12; // empty on success; enum-like string from Rust
  string error_msg    = 13;
  uint64 timestamp_ms = 14;
}
