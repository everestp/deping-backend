syntax = "proto3";

package monitor;

option go_package = "grpc/pb;pb";

// ─── Service Definition ────────────────────────────────────────────────────
service MonitorService {
  rpc JobStream(stream MinerMessage) returns (stream ServerMessage);
}

// ─── Miner → Server (Upstream) ─────────────────────────────────────────────
message MinerMessage {
  oneof payload {
    MinerRegister register      = 1;
    Ping          ping          = 2;
    ProbeResult   result        = 3;
    AuthResponse  auth_response = 4;
  }
}

message MinerRegister {
  string node_id      = 1;
  string version      = 2;
  uint64 timestamp_ms = 3;
}

message AuthResponse {
  bytes signature = 1; // Miner signs the challenge nonce
}

message Ping {
  uint64 timestamp_ms = 1;
  string node_id      = 2;
}

// ─── Server → Miner (Downstream) ───────────────────────────────────────────
message ServerMessage {
  oneof payload {
    Pong          pong          = 1;
    JobBatch      job_batch     = 2;
    AuthChallenge auth_challenge = 3;
  }
}

message AuthChallenge {
  string nonce = 1; // Random hex string for handshake
}

message Pong {
  uint64 timestamp_ms   = 1;
  uint64 server_time_ms = 2;
}

message JobBatch {
  string   batch_id = 1;
  repeated Job jobs = 2;
}

message Job {
  string job_id     = 1;
  string target_url = 2;
  uint32 timeout_ms = 3;
  string task_nonce = 4; // Required for signature verification
}

// ─── Probe Result (Miner → Server) ────────────────────────────────────────
message ProbeResult {
  string job_id      = 1;
  string batch_id    = 2;
  string node_id     = 3;
  string target_url  = 4;
  bool   success     = 5;
  uint32 status_code = 6;

  uint64 dns_us   = 7;
  uint64 tcp_us   = 8;
  uint64 tls_us   = 9;
  uint64 ttfb_us  = 10;
  uint64 total_us = 11;

  string error_kind   = 12;
  string error_msg    = 13;
  uint64 timestamp_ms = 14;

  // 🛡️ SECURITY FIELDS: Must be signed by the miner
  string task_nonce = 15; // Ensure this index is 15 in both projects
  bytes  signature  = 16; // Ensure this index is 16 in both projects
}
